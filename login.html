<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Anktatvaa</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Philosopher:ital,wght@0,400;0,700;1,400&family=Vesper+Libre:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <canvas id="cosmos"></canvas>

  <div class="page reveal">

    <!-- NAVBAR -->
    <nav class="navbar">
      <a href="index.html" class="nav-logo">
        <span class="nav-logo-symbol">◈</span>
        <span class="nav-logo-text">Anktatvaa</span>
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="index.html#features" class="nav-link">Readings</a>
        <a href="numerology.html" class="nav-link">Numerology</a>
        <a href="name-vibration.html" class="nav-link">Name Vibrations</a>
      </div>
      <div class="nav-auth">
        <a href="login.html" class="btn-nav-login active-nav">Login</a>
        <a href="signup.html" class="btn-nav-signup">Begin Journey</a>
      </div>
      <button class="nav-hamburger" id="navHamburger" onclick="toggleMobileMenu()">
        <span></span><span></span><span></span>
      </button>
    </nav>
    <div class="mobile-menu" id="mobileMenu">
      <a href="index.html" class="mobile-link">Home</a>
      <a href="index.html#features" class="mobile-link">Readings</a>
      <div class="mobile-auth">
        <a href="login.html" class="btn-nav-login">Login</a>
        <a href="signup.html" class="btn-nav-signup">Begin Journey</a>
      </div>
    </div>

    <!-- AUTH SECTION -->
    <section class="auth-section">

      <svg class="auth-mandala" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(200,200)" fill="none" opacity="0.3">
          <circle r="190" stroke="#00d4ff" stroke-width="0.5"/>
          <circle r="160" stroke="#38bdf8" stroke-width="0.4"/>
          <circle r="130" stroke="#00d4ff" stroke-width="0.4"/>
          <circle r="100" stroke="#a5f3fc" stroke-width="0.3"/>
          <circle r="70"  stroke="#38bdf8" stroke-width="0.3"/>
          <line x1="0" y1="-190" x2="0" y2="190" stroke="#00d4ff" stroke-width="0.3"/>
          <line x1="0" y1="-190" x2="0" y2="190" stroke="#38bdf8" stroke-width="0.3" transform="rotate(30)"/>
          <line x1="0" y1="-190" x2="0" y2="190" stroke="#38bdf8" stroke-width="0.3" transform="rotate(60)"/>
          <line x1="0" y1="-190" x2="0" y2="190" stroke="#00d4ff" stroke-width="0.3" transform="rotate(90)"/>
          <line x1="0" y1="-190" x2="0" y2="190" stroke="#38bdf8" stroke-width="0.3" transform="rotate(120)"/>
          <line x1="0" y1="-190" x2="0" y2="190" stroke="#38bdf8" stroke-width="0.3" transform="rotate(150)"/>
          <polygon points="0,-160 138.6,80 -138.6,80" stroke-width="0.7" stroke="#00d4ff"/>
          <polygon points="0,160 138.6,-80 -138.6,-80" stroke-width="0.7" stroke="#a5f3fc"/>
          <circle r="8" fill="rgba(0,212,255,0.6)"/>
        </g>
      </svg>

      <div class="auth-card">
        <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div><div class="corner corner-br"></div>

        <div class="auth-header">
          <div class="auth-icon">☆</div>
          <h1 class="auth-title">Welcome Back</h1>
          <p class="auth-subtitle">The stars have been waiting for your return</p>
        </div>

        <div class="divider" style="margin:1.8rem auto">
          <div class="divider-line"></div>
          <div class="divider-diamond"></div>
          <div class="divider-line"></div>
        </div>

        <div class="field-group">
          <label class="field-label" for="lemail">✦ Email Address</label>
          <input class="field-input" id="lemail" type="email" placeholder="your@email.com">
        </div>

        <div class="field-group pw-wrap">
          <label class="field-label" for="lpassword">✦ Sacred Password</label>
          <input class="field-input" id="lpassword" type="password" placeholder="Enter your password...">
          <button class="toggle-pw" onclick="togglePw('lpassword', this)" title="Show/Hide password">👁</button>
        </div>

        <div class="auth-options">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe">
            <span class="checkmark-box"></span>
            Remember me
          </label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button class="submit-btn" id="loginBtn" onclick="handleLogin()">◈ Enter The Cosmos ◈</button>
        <p class="error-msg" id="loginErr"></p>
        <p class="success-msg" id="loginSuccess"></p>

        <div class="auth-or">
          <div class="divider-line"></div>
          <span class="auth-or-text">or continue with</span>
          <div class="divider-line"></div>
        </div>

        <div class="social-btns">
          <button class="btn-social" onclick="socialMsg()">
            <svg width="17" height="17" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908C16.658 14.013 17.64 11.705 17.64 9.2z" fill="#4285F4"/>
              <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
              <path d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
              <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Google
          </button>
          <button class="btn-social" onclick="socialMsg()">
            <svg width="17" height="17" viewBox="0 0 24 24" fill="#1877F2" xmlns="http://www.w3.org/2000/svg">
              <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.236 2.686.236v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.268h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
            </svg>
            Facebook
          </button>
        </div>

        <p class="auth-switch">New to the cosmos? <a href="signup.html" class="auth-switch-link">Begin your journey →</a></p>
      </div>
    </section>

    <footer class="footer" style="padding:2rem">
      <p class="footer-copy">© 2025 Anktatvaa. All cosmic rights reserved.</p>
    </footer>
  </div>

  <script src="script.js"></script>
  <script>
    function toggleMobileMenu() {
      document.getElementById('mobileMenu').classList.toggle('open');
      document.getElementById('navHamburger').classList.toggle('active');
    }
    function togglePw(id, btn) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
      btn.textContent = el.type === 'password' ? '👁' : '🙈';
    }
    function socialMsg() {
      document.getElementById('loginErr').textContent = '◈ Social login coming soon — please use email';
    }
    function handleLogin() {
      const email = document.getElementById('lemail').value.trim();
      const pw    = document.getElementById('lpassword').value;
      const err   = document.getElementById('loginErr');
      const suc   = document.getElementById('loginSuccess');
      err.textContent = ''; suc.textContent = '';

      if (!email || !pw) { err.textContent = '◈ Please fill in all fields'; return; }
      if (!email.includes('@')) { err.textContent = '◈ Please enter a valid email'; return; }
      if (pw.length < 6) { err.textContent = '◈ Password must be at least 6 characters'; return; }

      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = '◈ Consulting the stars...';
      setTimeout(() => {
        btn.disabled = false; btn.textContent = '◈ Enter The Cosmos ◈';
        suc.textContent = '✦ Welcome back, seeker. Redirecting...';
        setTimeout(() => { window.location.href = 'index.html'; }, 1500);
      }, 1800);
    }
  </script>
</body>
</html>
